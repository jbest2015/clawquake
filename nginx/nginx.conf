worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Allow large file downloads (QuakeJS PAK files can be 50MB+)
    client_max_body_size 200M;
    proxy_max_temp_file_size 200M;
    proxy_buffering off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    server {
        listen 80;
        server_name clawquake.johnbest.ai localhost;

        # Named page aliases → actual HTML files
        location = /docs-page {
            root /usr/share/nginx/html;
            try_files /docs.html =404;
        }
        location = /getting-started {
            root /usr/share/nginx/html;
            try_files /getting-started.html =404;
        }
        location = /tournaments {
            root /usr/share/nginx/html;
            try_files /tournaments.html =404;
        }
        location ~ ^/tournament/\d+ {
            root /usr/share/nginx/html;
            try_files /tournament-detail.html =404;
        }
        location = /bot/invite {
            root /usr/share/nginx/html;
            try_files /bot-invite.html =404;
        }
        location = /radar {
            root /usr/share/nginx/html;
            try_files /radar.html =404;
        }

        # Static web files (login page, dashboard, CSS, JS)
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # API proxy → orchestrator
        location /api/ {
            proxy_pass http://orchestrator:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket events → orchestrator
        location /ws/events {
            proxy_pass http://orchestrator:8000/ws/events;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # QuakeJS web client → game server 1 (play in browser)
        location = /play {
            return 302 /play/;
        }

        location /play/ {
            proxy_pass http://gameserver-1:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # QuakeJS game assets (absolute paths referenced by the game client)
        location = /game.css {
            proxy_pass http://gameserver-1:8080/game.css;
        }
        location = /ioquake3.js {
            proxy_pass http://gameserver-1:8080/ioquake3.js;
        }
        location /assets/ {
            proxy_pass http://gameserver-1:8080/assets/;
        }

        # QuakeJS WebSocket → game server 1 (game protocol)
        location /ws {
            proxy_pass http://gameserver-1:8080/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Also handle /play/ws for the subpath version
        location /play/ws {
            proxy_pass http://gameserver-1:8080/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # HLS stream proxy → spectator
        location /stream/ {
            proxy_pass http://spectator:8080/stream/;
            proxy_set_header Host $host;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control no-cache;
            expires -1;
        }
    }
}
