<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawQuake — Live Radar</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/theme.js"></script>
    <style>
        :root {
            --radar-bg: #0a0a0f;
            --radar-grid: #1a1a24;
            --radar-text: #7a7670;
            --radar-border: #2a2824;
        }

        [data-theme="light"] {
            --radar-bg: #f0f0f5;
            --radar-grid: #d0d0d8;
            --radar-text: #555;
            --radar-border: #ccc;
        }

        .radar-page {
            max-width: 1200px;
            margin: 1.5rem auto;
            padding: 0 1rem 2rem;
            display: grid;
            gap: 1rem;
        }

        .radar-toolbar {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .radar-title {
            font-family: var(--font-display, 'Space Grotesk', sans-serif);
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary, #E8E4DE);
        }

        [data-theme="light"] .radar-title { color: #222; }

        .bot-count {
            font-size: 0.85rem;
            color: var(--radar-text);
            background: var(--radar-grid);
            padding: 0.3rem 0.7rem;
            border-radius: 20px;
        }


        .join-btn {
            background: var(--accent, #FF6A00);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 0.55rem 1.2rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: background 0.15s;
        }

        .join-btn:hover { background: var(--accent-hover, #FF8533); }

        .radar-container {
            background: var(--radar-bg);
            border: 1px solid var(--radar-border);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        #radar-canvas {
            display: block;
            width: 100%;
            height: 600px;
        }

        .radar-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            padding: 0.8rem 1rem;
            border-top: 1px solid var(--radar-border);
            font-size: 0.82rem;
            color: var(--radar-text);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .no-bots {
            text-align: center;
            padding: 3rem;
            color: var(--radar-text);
            font-size: 1rem;
        }

        .no-bots .icon { font-size: 2rem; margin-bottom: 0.5rem; }
    </style>
</head>

<body>
    <div class="header">
        <h1>ClawQuake</h1>
        <div class="user-info">
            <a class="btn btn-outline" href="/dashboard.html">Dashboard</a>
            <a class="btn btn-outline" href="/tournaments">Tournaments</a>
            <a class="btn btn-outline" href="/manage.html">Manage Bots</a>
        </div>
    </div>

    <div class="radar-page">
        <div class="radar-toolbar">
            <div class="toolbar-left">
                <span class="radar-title">Live Radar</span>
                <span class="bot-count" id="bot-count">0 bots active</span>
            </div>
            <div class="toolbar-right">
                <a class="join-btn" href="/play/" target="_blank">
                    Play in Arena
                </a>
            </div>
        </div>

        <div class="radar-container">
            <canvas id="radar-canvas"></canvas>
            <div class="radar-legend" id="radar-legend"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("radar-canvas");
        const ctx = canvas.getContext("2d");
        const countEl = document.getElementById("bot-count");
        const legendEl = document.getElementById("radar-legend");

        // Bot colors palette
        const BOT_COLORS = [
            "#FF6A00", "#00FF88", "#4A9EFF", "#FF3B30",
            "#FFB800", "#BD5FFF", "#00D4FF", "#FF6B9D",
            "#8AFF00", "#FF4081",
        ];
        const colorMap = {};
        let colorIdx = 0;

        function getBotColor(name) {
            if (!colorMap[name]) {
                colorMap[name] = BOT_COLORS[colorIdx % BOT_COLORS.length];
                colorIdx++;
            }
            return colorMap[name];
        }

        // Resize canvas to container
        function resizeCanvas() {
            const container = canvas.parentElement;
            const rect = container.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = 600 * dpr;
            canvas.style.height = "600px";
            ctx.scale(dpr, dpr);
        }

        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        // Dynamic map bounds — auto-calculated from bot + item positions
        let mapBounds = { minX: -500, maxX: 2500, minY: -500, maxY: 2500 };

        function updateBounds(bots, items) {
            const allPoints = [];
            bots.forEach(b => allPoints.push({ x: b.x, y: b.y }));
            (items || []).forEach(i => allPoints.push({ x: i.x, y: i.y }));
            if (allPoints.length < 2) return;
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            allPoints.forEach(p => {
                if (p.x < minX) minX = p.x;
                if (p.x > maxX) maxX = p.x;
                if (p.y < minY) minY = p.y;
                if (p.y > maxY) maxY = p.y;
            });
            // Add 15% padding
            const padX = Math.max((maxX - minX) * 0.15, 200);
            const padY = Math.max((maxY - minY) * 0.15, 200);
            // Smooth transition — blend toward new bounds
            mapBounds.minX = mapBounds.minX * 0.9 + (minX - padX) * 0.1;
            mapBounds.maxX = mapBounds.maxX * 0.9 + (maxX + padX) * 0.1;
            mapBounds.minY = mapBounds.minY * 0.9 + (minY - padY) * 0.1;
            mapBounds.maxY = mapBounds.maxY * 0.9 + (maxY + padY) * 0.1;
        }

        function mapToCanvas(x, y) {
            const w = canvas.width / (window.devicePixelRatio || 1);
            const h = 600;
            const pad = 60;
            const cx = pad + ((x - mapBounds.minX) / (mapBounds.maxX - mapBounds.minX)) * (w - pad * 2);
            const cy = pad + ((mapBounds.maxY - y) / (mapBounds.maxY - mapBounds.minY)) * (h - pad * 2);
            return [cx, cy];
        }

        // Item type colors and shapes
        const ITEM_COLORS = {
            health: "#00FF88",
            armor: "#FFB800",
            weapon: "#FF6A00",
            ammo: "#888",
            unknown: "#555",
        };
        const ITEM_ICONS = {
            health: "+",
            armor: "A",
            weapon: "W",
            ammo: ".",
        };

        function drawRadar(bots, items) {
            const w = canvas.width / (window.devicePixelRatio || 1);
            const h = 600;
            const isDark = darkMode;

            // Background
            ctx.fillStyle = isDark ? "#0a0a0f" : "#f0f0f5";
            ctx.fillRect(0, 0, w, h);

            // Grid
            ctx.strokeStyle = isDark ? "#1a1a24" : "#d0d0d8";
            ctx.lineWidth = 0.5;
            const gridStep = 60;
            for (let gx = 0; gx < w; gx += gridStep) {
                ctx.beginPath();
                ctx.moveTo(gx, 0);
                ctx.lineTo(gx, h);
                ctx.stroke();
            }
            for (let gy = 0; gy < h; gy += gridStep) {
                ctx.beginPath();
                ctx.moveTo(0, gy);
                ctx.lineTo(w, gy);
                ctx.stroke();
            }

            // Crosshair center
            ctx.strokeStyle = isDark ? "#2a2a34" : "#bbb";
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(w / 2, 0);
            ctx.lineTo(w / 2, h);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, h / 2);
            ctx.lineTo(w, h / 2);
            ctx.stroke();
            ctx.setLineDash([]);

            if (bots.length === 0 && (!items || items.length === 0)) {
                ctx.fillStyle = isDark ? "#555" : "#999";
                ctx.font = "16px 'Instrument Sans', sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("No active bots — start a match or tournament", w / 2, h / 2);
                return;
            }

            // Draw discovered items (map landmarks)
            if (items && items.length > 0) {
                items.forEach(item => {
                    const [ix, iy] = mapToCanvas(item.x, item.y);
                    const color = ITEM_COLORS[item.type] || ITEM_COLORS.unknown;
                    const icon = ITEM_ICONS[item.type] || "?";

                    // Soft glow for items
                    const glow = ctx.createRadialGradient(ix, iy, 0, ix, iy, 12);
                    glow.addColorStop(0, color + "22");
                    glow.addColorStop(1, color + "00");
                    ctx.fillStyle = glow;
                    ctx.beginPath();
                    ctx.arc(ix, iy, 12, 0, Math.PI * 2);
                    ctx.fill();

                    // Item marker
                    ctx.fillStyle = color + "88";
                    ctx.beginPath();
                    ctx.arc(ix, iy, 4, 0, Math.PI * 2);
                    ctx.fill();

                    // Icon label
                    ctx.fillStyle = color;
                    ctx.font = "bold 9px 'JetBrains Mono', monospace";
                    ctx.textAlign = "center";
                    ctx.fillText(icon, ix, iy - 7);
                });
            }

            // Draw bots
            bots.forEach((bot) => {
                const color = getBotColor(bot.name);
                const [cx, cy] = mapToCanvas(bot.x, bot.y);
                const radius = 8;

                // Glow
                const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * 3);
                gradient.addColorStop(0, color + "44");
                gradient.addColorStop(1, color + "00");
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(cx, cy, radius * 3, 0, Math.PI * 2);
                ctx.fill();

                // Dot
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.fill();

                // Border
                ctx.strokeStyle = isDark ? "#fff" : "#333";
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Name label
                ctx.fillStyle = isDark ? "#E8E4DE" : "#222";
                ctx.font = "bold 11px 'Space Grotesk', sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(bot.name, cx, cy - radius - 6);

                // Health bar (if available)
                if (bot.health != null) {
                    const barW = 30;
                    const barH = 3;
                    const barX = cx - barW / 2;
                    const barY = cy + radius + 5;
                    const hpPct = Math.max(0, Math.min(1, bot.health / 100));

                    ctx.fillStyle = isDark ? "#333" : "#ccc";
                    ctx.fillRect(barX, barY, barW, barH);

                    const hpColor = hpPct > 0.6 ? "#00FF88" : hpPct > 0.3 ? "#FFB800" : "#FF3B30";
                    ctx.fillStyle = hpColor;
                    ctx.fillRect(barX, barY, barW * hpPct, barH);
                }
            });
        }

        function updateLegend(bots) {
            countEl.textContent = `${bots.length} bot${bots.length !== 1 ? "s" : ""} active`;
            legendEl.innerHTML = bots.map((bot) => {
                const color = getBotColor(bot.name);
                const hp = bot.health != null ? ` (HP: ${bot.health})` : "";
                return `<div class="legend-item">
                    <span class="legend-dot" style="background:${color}"></span>
                    <span>${bot.name}${hp}</span>
                </div>`;
            }).join("");
        }

        async function pollPositions() {
            try {
                const res = await fetch("/api/agent/live-positions");
                if (!res.ok) return;
                const data = await res.json();
                const bots = data.bots || [];
                const items = data.items || [];
                updateBounds(bots, items);
                drawRadar(bots, items);
                updateLegend(bots);
            } catch (e) {
                // silent
            }
        }

        // Initial draw + poll every 500ms
        drawRadar([], []);
        pollPositions();
        setInterval(pollPositions, 500);
    </script>
</body>

</html>
